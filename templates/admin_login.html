{% extends "layout.html" %}

{% block content %}

<div class="login-box">

    <h1>👑 Admin Login</h1>

    {% with messages = get_flashed_messages() %}
    {% if messages %}
    <div class="message">
        {{ messages[0] }}
    </div>
    {% endif %}
    {% endwith %}

    <form method="POST">

        <input
            type="text"
            name="username"
            placeholder="Username"
            required>

        <input
            type="password"
            name="password"
            placeholder="Password"
            required>

        <button type="submit">

            دخول

        </button>

    </form>

</div>

{% endblock %}
